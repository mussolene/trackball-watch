name: TrackBallWatch
options:
  bundleIdPrefix: com.trackball-watch
  deploymentTarget:
    watchOS: "11.0"
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM comes from Local.xcconfig (not tracked in git)

targets:
  TrackBallCompanion-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrackBallCompanion-iOS
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trackball-watch.app
        INFOPLIST_FILE: TrackBallCompanion-iOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: TrackBallWatch-watchOS
        embed: true

  TrackBallWatch-watchOS:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: "TrackBallWatch Watch App"
        createIntermediateGroups: true
        excludes:
          - "Tests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trackball-watch.app.watchkitapp
        INFOPLIST_FILE: "TrackBallWatch Watch App/Info.plist"
        TARGETED_DEVICE_FAMILY: "4"
        WK_APPLICATION: YES
        WK_COMPANION_APP_BUNDLE_IDENTIFIER: com.trackball-watch.app

  TrackBallWatch-Tests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: "TrackBallWatch Watch App/Tests"
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trackball-watch.app.watchkitapp.tests
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - target: TrackBallWatch-watchOS

schemes:
  TrackBallWatch:
    build:
      targets:
        TrackBallCompanion-iOS: all
        TrackBallWatch-watchOS: all
    run:
      config: Debug
      executable: TrackBallCompanion-iOS
    test:
      config: Debug
      targets:
        - name: TrackBallWatch-Tests
          parallelizable: true
