name: TrackBallWatch
options:
  bundleIdPrefix: com.trackball-watch
  deploymentTarget:
    watchOS: "10.0"
    iOS: "16.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  TrackBallCompanion-iOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TrackBallCompanion-iOS
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trackball-watch.app
        INFOPLIST_FILE: TrackBallCompanion-iOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: TrackBallWatch-watchOS

  TrackBallWatch-watchOS:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: TrackBallWatch Watch App
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trackball-watch.app.watchkitapp
        INFOPLIST_FILE: "TrackBallWatch Watch App/Info.plist"
        TARGETED_DEVICE_FAMILY: "4"
        WK_APPLICATION: YES

schemes:
  TrackBallWatch-watchOS:
    build:
      targets:
        TrackBallWatch-watchOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: TrackBallWatch-watchOS
          parallelizable: true
