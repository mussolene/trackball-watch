name: TrackBallCompanion
options:
  bundleIdPrefix: com.trackball-watch
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  TrackBallCompanion:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TrackBallCompanion
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trackball-watch.app
        INFOPLIST_FILE: TrackBallCompanion/Info.plist
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  TrackBallCompanion:
    build:
      targets:
        TrackBallCompanion: all
    run:
      config: Debug
    test:
      config: Debug
