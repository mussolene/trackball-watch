name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS universal binary ────────────────────────────────────────────────
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-15
    env:
      # secrets are not valid in step `if:` for workflow schema; use booleans from env instead.
      HAS_APPLE_NOTARIZE: ${{ secrets.APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/host-desktop/src-tauri

      - name: Sync desktop version from git tag
        run: node scripts/sync-version-from-git.mjs

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/host-desktop/package.json

      - name: Install JS dependencies
        working-directory: apps/host-desktop
        run: npm ci

      - name: Build aarch64
        working-directory: apps/host-desktop
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build x86_64
        working-directory: apps/host-desktop
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # Tauri uses `mainBinaryName` (TrackBallWatch) for the release binary, not Cargo's [[bin]] name.
      - name: Create universal binary with lipo
        run: |
          set -euo pipefail
          AARCH_DIR="apps/host-desktop/src-tauri/target/aarch64-apple-darwin/release"
          X64_DIR="apps/host-desktop/src-tauri/target/x86_64-apple-darwin/release"
          if [[ -f "$AARCH_DIR/TrackBallWatch" ]]; then AARCH_BIN="$AARCH_DIR/TrackBallWatch"
          elif [[ -f "$AARCH_DIR/trackball-watch" ]]; then AARCH_BIN="$AARCH_DIR/trackball-watch"
          else echo "No aarch64 binary in $AARCH_DIR" >&2; ls -la "$AARCH_DIR" >&2 || true; exit 1; fi
          if [[ -f "$X64_DIR/TrackBallWatch" ]]; then X64_BIN="$X64_DIR/TrackBallWatch"
          elif [[ -f "$X64_DIR/trackball-watch" ]]; then X64_BIN="$X64_DIR/trackball-watch"
          else echo "No x86_64 binary in $X64_DIR" >&2; ls -la "$X64_DIR" >&2 || true; exit 1; fi
          mkdir -p universal/TrackBallWatch.app/Contents/MacOS
          lipo -create "$AARCH_BIN" "$X64_BIN" -output universal/trackball-watch-universal

      - name: Notarize (production only)
        if: env.HAS_APPLE_NOTARIZE == 'true'
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_CERT_P12_PASSWORD }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            apps/host-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/host-desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  # ── Windows MSI ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    env:
      HAS_WINDOWS_SIGN: ${{ secrets.WINDOWS_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/host-desktop/src-tauri

      - name: Sync desktop version from git tag
        run: node scripts/sync-version-from-git.mjs

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/host-desktop/package.json

      - name: Install JS dependencies
        working-directory: apps/host-desktop
        run: npm ci

      - name: Build
        working-directory: apps/host-desktop
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Sign (EV cert, production only)
        if: env.HAS_WINDOWS_SIGN == 'true'
        run: |
          signtool sign /sha1 ${{ secrets.WINDOWS_CERT_THUMBPRINT }} /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
            apps\host-desktop\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\*.msi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: apps/host-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  # ── Apple mobile bundle (iPhone companion + embedded watch app) ───────────
  build-apple-mobile:
    name: Build Apple mobile archive
    runs-on: macos-15
    env:
      HAS_APPLE_DIST_CERT: ${{ secrets.APPLE_DIST_CERT_P12 != '' }}
      HAS_APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE != '' }}
      HAS_APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      # Same rationale as CI swift-check: use 16.4 on GitHub-hosted macos-15 for watch/iOS SDK + sim parity.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Prepare Local.xcconfig (not committed; required by XcodeGen project)
        run: cp apps/watch-ios/Local.xcconfig.example apps/watch-ios/Local.xcconfig

      - name: Import signing certificate
        if: env.HAS_APPLE_DIST_CERT == 'true'
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_DIST_CERT_P12_PASSWORD }}

      - name: Download provisioning profiles
        if: env.HAS_APPLE_PROVISIONING_PROFILE == 'true'
        uses: Apple-Actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.trackball-watch.app
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Archive Apple mobile bundle (signed)
        if: env.HAS_APPLE_DIST_CERT == 'true'
        run: |
          xcodebuild archive \
            -project apps/watch-ios/TrackBallWatch.xcodeproj \
            -scheme TrackBallWatch \
            -destination generic/platform=iOS \
            -archivePath /tmp/trackball-apple-mobile.xcarchive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER=com.trackball-watch.app

      - name: Skip Apple mobile archive (no distribution signing secrets)
        if: env.HAS_APPLE_DIST_CERT != 'true'
        run: |
          echo "Skipping iOS archive: set repo secrets APPLE_DIST_CERT_P12 (+ password) to build a signed archive."
          echo "Desktop release (DMG/MSI) is unaffected; this job is optional until Apple signing is configured."

      - name: Upload to TestFlight
        if: env.HAS_APPSTORE_API_KEY == 'true'
        run: |
          echo "Apple upload pipeline requires explicit exportOptions.plist and ipa export."
          echo "Archive created at /tmp/trackball-apple-mobile.xcarchive"

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/windows

      - name: Extract CHANGELOG excerpt
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TrackBall Watch ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/macos/*.dmg
            dist/windows/*.msi
