name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS universal binary ────────────────────────────────────────────────
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/host-desktop/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/host-desktop/package.json

      - name: Install JS dependencies
        working-directory: apps/host-desktop
        run: npm ci

      - name: Build aarch64
        working-directory: apps/host-desktop
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build x86_64
        working-directory: apps/host-desktop
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Create universal binary with lipo
        run: |
          mkdir -p universal/TrackBallWatch.app/Contents/MacOS
          lipo -create \
            apps/host-desktop/src-tauri/target/aarch64-apple-darwin/release/trackball-watch \
            apps/host-desktop/src-tauri/target/x86_64-apple-darwin/release/trackball-watch \
            -output universal/trackball-watch-universal

      - name: Notarize (production only)
        if: ${{ secrets.APPLE_ID != '' }}
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_CERT_P12_PASSWORD }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            apps/host-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/host-desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  # ── Windows MSI ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/host-desktop/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/host-desktop/package.json

      - name: Install JS dependencies
        working-directory: apps/host-desktop
        run: npm ci

      - name: Build
        working-directory: apps/host-desktop
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Sign (EV cert, production only)
        if: ${{ secrets.WINDOWS_CERT_THUMBPRINT != '' }}
        run: |
          signtool sign /sha1 ${{ secrets.WINDOWS_CERT_THUMBPRINT }} /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
            apps\host-desktop\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\*.msi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: apps/host-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  # ── Apple mobile bundle (iPhone companion + embedded watch app) ───────────
  build-apple-mobile:
    name: Build Apple mobile archive
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Import signing certificate
        if: ${{ secrets.APPLE_DIST_CERT_P12 != '' }}
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_DIST_CERT_P12_PASSWORD }}

      - name: Download provisioning profiles
        if: ${{ secrets.APPLE_PROVISIONING_PROFILE != '' }}
        uses: Apple-Actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.trackball-watch.app
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Archive Apple mobile bundle
        run: |
          xcodebuild archive \
            -project apps/watch-ios/TrackBallWatch.xcodeproj \
            -scheme TrackBallWatch \
            -destination generic/platform=iOS \
            -archivePath /tmp/trackball-apple-mobile.xcarchive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER=com.trackball-watch.app

      - name: Upload to TestFlight
        if: ${{ secrets.APPSTORE_API_PRIVATE_KEY != '' }}
        run: |
          echo "Apple upload pipeline requires explicit exportOptions.plist and ipa export."
          echo "Archive created at /tmp/trackball-apple-mobile.xcarchive"

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/windows

      - name: Extract CHANGELOG excerpt
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TrackBall Watch ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/macos/*.dmg
            dist/windows/*.msi
