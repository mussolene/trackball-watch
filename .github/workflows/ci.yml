name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  host-rust:
    name: Host core (Rust)
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          pkg-config --print-errors --exists glib-2.0 gobject-2.0 gio-2.0 'gtk+-3.0'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/host-desktop/src-tauri

      - name: Build frontend (Tauri requires ../dist for generate_context!)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/host-desktop/package-lock.json

      - run: npm ci && npm run build
        working-directory: apps/host-desktop

      - name: Check formatting
        working-directory: apps/host-desktop/src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: apps/host-desktop/src-tauri
        run: cargo clippy -- -D warnings

      - name: Tests
        working-directory: apps/host-desktop/src-tauri
        run: cargo test --all-features

  tools-rust:
    name: Tools (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/latency-tester

      - name: Check latency-tester
        working-directory: tools/latency-tester
        run: cargo check

  host-coverage:
    name: Host coverage
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          pkg-config --print-errors --exists glib-2.0 gobject-2.0 gio-2.0 'gtk+-3.0'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/host-desktop/src-tauri

      - name: Build frontend (Tauri requires ../dist for generate_context!)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/host-desktop/package-lock.json

      - run: npm ci && npm run build
        working-directory: apps/host-desktop

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        working-directory: apps/host-desktop/src-tauri
        env:
          # tarpaulin compiles in an isolated workspace where ../dist may not exist
          TAURI_CONFIG: '{"build":{"frontendDist":"."}}'
        run: cargo tarpaulin --out Xml --output-dir coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/host-desktop/src-tauri/coverage/cobertura.xml
          fail_ci_if_error: false

  swift-check:
    name: Apple clients (xcodebuild)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # 16.4 matches GitHub macos-15 default: preinstalled watch simulators align with this SDK.
      # Xcode 16.0’s watchsimulator slice can mismatch those runtimes; xcodebuild -downloadPlatform
      # often fails headless with "Unable to connect to simulator" (exit 70).
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Prepare Local.xcconfig (not committed; required by XcodeGen project)
        run: cp apps/watch-ios/Local.xcconfig.example apps/watch-ios/Local.xcconfig

      - name: Build Apple watch target
        run: |
          xcodebuild build \
            -project apps/watch-ios/TrackBallWatch.xcodeproj \
            -scheme TrackBallWatch-watchOS \
            -destination 'generic/platform=watchOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Build Apple mobile companion target
        run: |
          xcodebuild build \
            -project apps/watch-ios/TrackBallWatch.xcodeproj \
            -scheme TrackBallWatch \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  ci-passes:
    name: All checks pass
    runs-on: ubuntu-latest
    needs: [ host-rust, host-coverage, tools-rust, swift-check ]
    steps:
      - run: echo "CI passed"
